<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李昀洁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════ RESET & BASE ═══════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d0b0a;
  --bg-alt: #141110;
  --text: #e8e0d5;
  --text-muted: #9b8e7c;
  --gold: #c9a96e;
  --gold-light: #e0c78a;
  --gold-dark: #8b6914;
  --rose: #b8755c;
  --rose-light: #d4957e;
  --cream: #f5efe4;
  --white: #ffffff;
}

html { scroll-behavior:smooth; scrollbar-width:thin; scrollbar-color:var(--gold-dark) var(--bg); }
html::-webkit-scrollbar { width:4px; }
html::-webkit-scrollbar-track { background:var(--bg); }
html::-webkit-scrollbar-thumb { background:var(--gold-dark); border-radius:2px; }

body {
  font-family:'Jost','Noto Serif SC',serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  overflow-x:hidden;
  cursor:none;
}

/* ═══════════════════════════ CUSTOM CURSOR ═══════════════════════════ */
.cursor {
  width:24px; height:24px;
  border:1.5px solid var(--gold);
  border-radius:50%;
  position:fixed; z-index:9999;
  pointer-events:none;
  transition:width 0.3s, height 0.3s, border-color 0.3s, background 0.3s;
  transform:translate(-50%,-50%);
  mix-blend-mode: difference;
}
.cursor-dot {
  width:5px; height:5px;
  background:var(--gold-light);
  border-radius:50%;
  position:fixed; z-index:9999;
  pointer-events:none;
  transform:translate(-50%,-50%);
}
.cursor.hover { width:56px; height:56px; background:rgba(201,169,110,0.12); border-color:var(--gold-light); }

/* ═══════════════════════════ LOADER ═══════════════════════════ */
.loader {
  position:fixed; inset:0; z-index:9998;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.7s ease, visibility 0.7s ease;
}
.loader.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.loader-ring {
  width:60px; height:60px;
  border:1px solid rgba(201,169,110,0.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1.2s cubic-bezier(0.6,0.2,0.4,0.8) infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ═══════════════════════════ NOISE OVERLAY ═══════════════════════════ */
.noise {
  position:fixed; inset:0; z-index:9997;
  pointer-events:none; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ═══════════════════════════ MUSIC TOGGLE ═══════════════════════════ */
.music-toggle {
  position:fixed; bottom:40px; left:40px; z-index:200;
  width:44px; height:44px;
  border:1px solid rgba(201,169,110,0.3);
  border-radius:50%;
  background:rgba(13,11,10,0.7);
  backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  cursor:none;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.music-toggle:hover { border-color:var(--gold); box-shadow:0 0 24px rgba(201,169,110,0.2); }
.music-toggle .music-icon {
  color:var(--gold);
  font-size:1.1rem;
  transition:opacity 0.3s;
  line-height:1;
  user-select:none;
}
.music-toggle.playing .music-icon { animation:musicPulse 2s ease-in-out infinite; }
.music-toggle:not(.playing) .music-icon { opacity:0.5; }
@keyframes musicPulse {
  0%,100% { opacity:0.7; }
  50%     { opacity:1; }
}

/* ═══════════════════════════ NAV ═══════════════════════════ */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:32px 56px;
  display:flex; justify-content:space-between; align-items:center;
  mix-blend-mode:difference;
  color:#fff;
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
nav.hidden { transform:translateY(-100%); }
nav .logo {
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;
  letter-spacing:0.35em;
  font-weight:300;
}
nav .menu-text {
  font-family:'Cormorant Garamond',serif;
  font-size:0.8rem;
  letter-spacing:0.35em;
  opacity:0.7;
}

/* ═══════════════════════════ HERO ═══════════════════════════ */
.hero {
  height:100vh; min-height:750px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  overflow:hidden;
}

/* Floating particles */
.hero-particles {
  position:absolute; inset:0;
  pointer-events:none;
}
.particle {
  position:absolute;
  width:1px; height:1px;
  background:var(--gold);
  border-radius:50%;
  animation:floatUp linear infinite;
  opacity:0;
}
@keyframes floatUp {
  0%   { transform:translateY(0) scale(1); opacity:0; }
  10%  { opacity:0.8; }
  90%  { opacity:0.3; }
  100% { transform:translateY(-100vh) scale(0.3); opacity:0; }
}

.hero-center { text-align:center; position:relative; z-index:2; }
.hero-overline {
  font-family:'Cormorant Garamond',serif;
  font-size:0.85rem;
  letter-spacing:0.6em;
  color:var(--gold);
  margin-bottom:28px;
  opacity:0;
  animation:heroReveal 1.2s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  text-transform:uppercase;
}
.hero-name {
  font-family:'Noto Serif SC',serif;
  font-size:clamp(4rem, 9vw, 9rem);
  font-weight:700;
  letter-spacing:0.06em;
  line-height:1;
  background:linear-gradient(180deg, var(--cream) 0%, var(--gold) 50%, var(--rose-light) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  opacity:0;
  animation:heroReveal 1.2s 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  filter:drop-shadow(0 0 60px rgba(201,169,110,0.25));
}
.hero-decorator {
  display:flex; align-items:center; justify-content:center; gap:16px;
  margin-top:36px;
  opacity:0;
  animation:heroReveal 1.2s 1s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-decorator .line {
  width:60px; height:1px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
}
.hero-decorator .diamond {
  width:6px; height:6px;
  background:var(--gold);
  transform:rotate(45deg);
  box-shadow:0 0 12px rgba(201,169,110,0.6);
}
.hero-subtitle {
  margin-top:28px;
  font-family:'Noto Serif SC',serif;
  font-size:0.95rem;
  letter-spacing:0.25em;
  color:var(--text-muted);
  font-weight:200;
  opacity:0;
  animation:heroReveal 1.2s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-scroll-indicator {
  position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0;
  animation:heroReveal 1.2s 1.5s cubic-bezier(0.16,1,0.3,1) forwards;
  z-index:2;
}
.hero-scroll-indicator span {
  font-size:0.65rem; letter-spacing:0.35em;
  color:var(--text-muted);
  text-transform:uppercase;
  font-family:'Jost',sans-serif;
}
.hero-scroll-indicator .scroll-line {
  width:1px; height:40px;
  background:linear-gradient(to bottom, var(--gold), transparent);
  animation:scrollGlow 2.5s ease-in-out infinite;
}
@keyframes scrollGlow {
  0%,100% { opacity:0.3; transform:scaleY(0.8); }
  50%     { opacity:1; transform:scaleY(1.2); }
}
@keyframes heroReveal {
  from { opacity:0; transform:translateY(40px); filter:blur(8px); }
  to   { opacity:1; transform:translateY(0); filter:blur(0); }
}

/* ═══════════════════════════ SECTION TITLES ═══════════════════════════ */
.section-heading {
  text-align:center; padding:0 24px 80px;
}
.section-heading .num {
  font-family:'Cormorant Garamond',serif;
  font-size:1rem; color:var(--gold);
  letter-spacing:0.4em;
  display:block; margin-bottom:16px;
}
.section-heading h2 {
  font-family:'Noto Serif SC',serif;
  font-size:clamp(2rem, 4vw, 3rem);
  font-weight:400;
  letter-spacing:0.1em;
  color:var(--cream);
}

/* ═══════════════════════════ GALLERY ═══════════════════════════ */
.gallery-section { padding:60px 0 140px; }
.gallery-container { max-width:1500px; margin:0 auto; padding:0 40px; }

.gallery {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:4px;
}

.gallery-item {
  position:relative; overflow:hidden; cursor:none;
  background:#1a1714;
}
.gallery-item img {
  width:100%; height:100%; object-fit:cover;
  display:block;
  transition:transform 1.2s cubic-bezier(0.16,1,0.3,1), filter 1.2s ease;
  filter:brightness(0.85) saturate(0.9);
}
.gallery-item:hover img {
  transform:scale(1.06);
  filter:brightness(1.1) saturate(1.1);
}

/* Overlay on hover */
.gallery-item .item-overlay {
  position:absolute; inset:0;
  background:linear-gradient(180deg,
    transparent 0%,
    rgba(13,11,10,0.1) 40%,
    rgba(13,11,10,0.75) 100%
  );
  opacity:0;
  transition:opacity 0.5s ease;
  display:flex; align-items:flex-end; padding:32px;
}
.gallery-item:hover .item-overlay { opacity:1; }
.gallery-item .item-number {
  font-family:'Cormorant Garamond',serif;
  font-size:0.8rem; letter-spacing:0.3em;
  color:var(--gold-light);
}

/* Varied grid sizes */
.gallery-item:nth-child(1)  { grid-column:span 2; grid-row:span 2; }
.gallery-item:nth-child(2)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(3)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(4)  { grid-column:span 2; grid-row:span 1; }
.gallery-item:nth-child(5)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(6)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(7)  { grid-column:span 2; grid-row:span 2; }
.gallery-item:nth-child(8)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(9)  { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(10) { grid-column:span 2; grid-row:span 1; }
.gallery-item:nth-child(11) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(12) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(13) { grid-column:span 2; grid-row:span 1; }
.gallery-item:nth-child(14) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(15) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(16) { grid-column:span 2; grid-row:span 2; }
.gallery-item:nth-child(17) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(18) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(19) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(20) { grid-column:span 1; grid-row:span 1; }
.gallery-item:nth-child(21) { grid-column:span 2; grid-row:span 1; }

/* Reveal */
.gallery-item {
  opacity:0; transform:translateY(80px);
  transition:opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.gallery-item.revealed { opacity:1; transform:translateY(0); }

/* ═══════════════════════════ FEATURED STRIP ═══════════════════════════ */
.featured-strip {
  padding:120px 0;
  position:relative; overflow:hidden;
}
.featured-strip::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right, transparent, rgba(201,169,110,0.3), transparent);
}
.featured-strip-inner {
  display:flex; gap:60px; align-items:center;
  max-width:1200px; margin:0 auto; padding:0 48px;
}
.featured-text {
  flex:0 0 300px;
}
.featured-text .num {
  font-family:'Cormorant Garamond',serif;
  font-size:0.85rem; color:var(--gold);
  letter-spacing:0.4em;
  margin-bottom:20px;
}
.featured-text h3 {
  font-family:'Noto Serif SC',serif;
  font-size:2rem; font-weight:400;
  letter-spacing:0.08em; line-height:1.6;
  color:var(--cream);
}
.featured-text .accent {
  color:var(--gold);
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
}
.featured-image {
  flex:1; max-width:500px; aspect-ratio:3/4;
  overflow:hidden; position:relative;
  border-radius:2px;
}
.featured-image img {
  width:100%; height:100%; object-fit:contain;
  background:#141110;
  transition:transform 1.5s cubic-bezier(0.16,1,0.3,1);
  filter:brightness(0.95);
}
.featured-image::before {
  content:''; position:absolute; inset:-2px;
  border:1px solid transparent;
  border-radius:2px;
  transition:border-color 0.5s, box-shadow 0.5s;
  z-index:1; pointer-events:none;
}
.featured-image:hover::before {
  border-color:rgba(201,169,110,0.25);
  box-shadow:0 0 40px rgba(201,169,110,0.08), inset 0 0 40px rgba(201,169,110,0.04);
}
.featured-image:hover img { transform:scale(1.05); }

/* ═══════════════════════════ QUOTE ═══════════════════════════ */
.quote-section {
  padding:100px 48px 80px;
  text-align:center;
  position:relative;
}
.quote-section::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:80px; height:1px;
  background:linear-gradient(to right, transparent, rgba(201,169,110,0.4), transparent);
}
.quote-mark {
  font-family:'Cormorant Garamond',serif;
  font-size:8rem; line-height:1;
  color:var(--gold);
  opacity:0.15;
  font-style:italic;
  margin-bottom:-40px;
}
.quote-text {
  font-family:'Noto Serif SC',serif;
  font-size:clamp(1.2rem, 2.5vw, 1.6rem);
  letter-spacing:0.06em;
  line-height:2.2;
  color:var(--text-muted);
  font-weight:200;
  max-width:600px; margin:0 auto;
}
.quote-text .highlight {
  display:inline-block;
  position:relative;
}
.quote-text .highlight::after {
  content:''; position:absolute; bottom:2px; left:0; right:0; height:1px;
  background:var(--gold);
  opacity:0.3;
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.quote-section.revealed .highlight::after { transform:scaleX(1); }

/* ═══════════════════════════ LIGHTBOX ═══════════════════════════ */
.lightbox {
  position:fixed; inset:0; z-index:10000;
  background:rgba(8,6,4,0.96);
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden;
  transition:opacity 0.5s ease, visibility 0.5s ease;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
}
.lightbox.active { opacity:1; visibility:visible; }

.lightbox-img-wrap {
  position:relative; max-width:88vw; max-height:88vh;
}
.lightbox-img-wrap img {
  max-width:100%; max-height:88vh; object-fit:contain;
  border-radius:2px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6), 0 0 120px rgba(201,169,110,0.08);
  transform:scale(0.92);
  transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
}
.lightbox.active .lightbox-img-wrap img { transform:scale(1); }

.lightbox-close {
  position:absolute; top:28px; right:40px;
  background:none; border:none; color:var(--gold);
  font-size:2.4rem; cursor:none;
  width:52px; height:52px; display:flex; align-items:center; justify-content:center;
  opacity:0.6; transition:opacity 0.3s;
  z-index:2;
}
.lightbox-close:hover { opacity:1; }

.lightbox-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  background:none; border:none;
  color:var(--gold-light);
  font-size:3rem; cursor:none;
  width:64px; height:64px; display:flex; align-items:center; justify-content:center;
  opacity:0.4; transition:opacity 0.3s;
  font-family:'Cormorant Garamond',serif;
}
.lightbox-nav:hover { opacity:1; }
.lightbox-prev { left:16px; }
.lightbox-next { right:16px; }

.lightbox-info {
  position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:16px;
}
.lightbox-info .counter {
  font-family:'Cormorant Garamond',serif;
  font-size:0.85rem; letter-spacing:0.3em;
  color:rgba(201,169,110,0.6);
}
.lightbox-info .divider {
  width:30px; height:1px;
  background:rgba(201,169,110,0.3);
}

/* ═══════════════════════════ BACKGROUND ORBS ═══════════════════════════ */
.bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; }
.bg-orb {
  position:absolute; border-radius:50%;
  filter:blur(120px);
  opacity:0.04;
  animation:orbDrift 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) {
  width:600px; height:600px;
  background:radial-gradient(circle, var(--gold), transparent);
  top:-15%; left:-10%;
  animation-delay:0s;
}
.bg-orb:nth-child(2) {
  width:500px; height:500px;
  background:radial-gradient(circle, var(--rose), transparent);
  bottom:-10%; right:-8%;
  animation-delay:-7s;
}
.bg-orb:nth-child(3) {
  width:400px; height:400px;
  background:radial-gradient(circle, var(--gold-light), transparent);
  top:50%; left:60%;
  animation-delay:-14s;
}
@keyframes orbDrift {
  0%,100% { transform:translate(0,0) scale(1); }
  25%     { transform:translate(40px,-30px) scale(1.08); }
  50%     { transform:translate(-20px,20px) scale(0.94); }
  75%     { transform:translate(-35px,-15px) scale(1.04); }
}

/* ═══════════════════════════ BACK TO TOP ═══════════════════════════ */
.back-to-top {
  position:fixed; bottom:40px; right:40px; z-index:200;
  width:48px; height:48px;
  border:1px solid rgba(201,169,110,0.3);
  border-radius:50%;
  background:rgba(13,11,10,0.7);
  backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  cursor:none;
  opacity:0; visibility:hidden;
  transition:opacity 0.4s, visibility 0.4s, border-color 0.3s, box-shadow 0.3s;
}
.back-to-top.visible { opacity:1; visibility:visible; animation:btnPulse 3s ease-in-out infinite; }
.back-to-top:hover { border-color:var(--gold); box-shadow:0 0 24px rgba(201,169,110,0.2); }
.back-to-top .arrow {
  color:var(--gold);
  font-size:1.4rem;
  font-family:'Cormorant Garamond',serif;
  transition:transform 0.3s;
  line-height:1;
}
.back-to-top:hover .arrow { transform:translateY(-3px); }
@keyframes btnPulse {
  0%,100% { box-shadow:0 0 0 rgba(201,169,110,0); }
  50%     { box-shadow:0 0 20px rgba(201,169,110,0.12); }
}

/* ═══════════════════════════ VIGNETTE ═══════════════════════════ */
.vignette {
  position:fixed; inset:0; pointer-events:none; z-index:1;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(13,11,10,0.55) 100%);
}

/* ═══════════════════════════ FLOATING RINGS ═══════════════════════════ */
.floating-rings { position:fixed; inset:0; pointer-events:none; z-index:0; }
.floating-ring {
  position:absolute; border-radius:50%;
  border:0.5px solid rgba(201,169,110,0.08);
  animation:ringFloat 24s ease-in-out infinite;
}
.floating-ring:nth-child(1) { width:300px; height:300px; top:20%; left:5%; animation-delay:0s; }
.floating-ring:nth-child(2) { width:200px; height:200px; top:60%; right:10%; animation-delay:-6s; }
.floating-ring:nth-child(3) { width:400px; height:400px; bottom:15%; left:30%; animation-delay:-12s; }
.floating-ring:nth-child(4) { width:180px; height:180px; top:35%; right:30%; animation-delay:-18s; }
@keyframes ringFloat {
  0%,100% { transform:translate(0,0) rotate(0deg); }
  33%     { transform:translate(30px,-25px) rotate(3deg); }
  66%     { transform:translate(-20px,15px) rotate(-2deg); }
}

/* ═══════════════════════════ CORNER ACCENTS ═══════════════════════════ */
.gallery-item .corner-accent {
  position:absolute; width:20px; height:20px;
  pointer-events:none; z-index:3;
  opacity:0;
  transition:opacity 0.5s ease;
}
.gallery-item:hover .corner-accent { opacity:1; }
.gallery-item .corner-accent::before,
.gallery-item .corner-accent::after {
  content:''; position:absolute;
  background:var(--gold);
}
.corner-tl { top:10px; left:10px; }
.corner-tl::before { top:0; left:0; width:10px; height:1px; }
.corner-tl::after  { top:0; left:0; width:1px; height:10px; }
.corner-tr { top:10px; right:10px; }
.corner-tr::before { top:0; right:0; width:10px; height:1px; }
.corner-tr::after  { top:0; right:0; width:1px; height:10px; }
.corner-bl { bottom:10px; left:10px; }
.corner-bl::before { bottom:0; left:0; width:10px; height:1px; }
.corner-bl::after  { bottom:0; left:0; width:1px; height:10px; }
.corner-br { bottom:10px; right:10px; }
.corner-br::before { bottom:0; right:0; width:10px; height:1px; }
.corner-br::after  { bottom:0; right:0; width:1px; height:10px; }

/* ═══════════════════════════ SECTION SHIMMER ═══════════════════════════ */
.section-heading h2 {
  position:relative;
  display:inline-block;
}
.section-heading h2::after {
  content:'';
  position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
  width:40px; height:1px;
  background:var(--gold);
  opacity:0.5;
}
@keyframes textShimmer {
  0%,100% { background-position:-200% center; }
  100%   { background-position:200% center; }
}

/* ═══════════════════════════ SPARKLES ═══════════════════════════ */
.sparkle-container { position:fixed; inset:0; pointer-events:none; z-index:2; }
.sparkle {
  position:absolute;
  width:2px; height:2px;
  background:var(--gold-light);
  border-radius:50%;
  animation:sparklePop 1.5s ease-out forwards;
  opacity:0;
}
@keyframes sparklePop {
  0%   { opacity:0; transform:scale(0); }
  30%  { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(0) translateY(-30px); }
}

/* ═══════════════════════════ DECORATIVE CORNER BRACKETS ═══════════════════════════ */
.page-bracket {
  position:fixed; pointer-events:none; z-index:10;
  width:40px; height:40px;
  opacity:0.2;
}
.page-bracket::before,
.page-bracket::after {
  content:''; position:absolute;
  background:var(--gold);
}
.bracket-tl { top:24px; left:24px; }
.bracket-tl::before { top:0; left:0; width:15px; height:1px; }
.bracket-tl::after  { top:0; left:0; width:1px; height:15px; }
.bracket-tr { top:24px; right:24px; }
.bracket-tr::before { top:0; right:0; width:15px; height:1px; }
.bracket-tr::after  { top:0; right:0; width:1px; height:15px; }
.bracket-bl { bottom:24px; left:24px; }
.bracket-bl::before { bottom:0; left:0; width:15px; height:1px; }
.bracket-bl::after  { bottom:0; left:0; width:1px; height:15px; }
.bracket-br { bottom:24px; right:24px; }
.bracket-br::before { bottom:0; right:0; width:15px; height:1px; }
.bracket-br::after  { bottom:0; right:0; width:1px; height:15px; }

/* ═══════════════════════════ ENHANCED STATS ═══════════════════════════ */
.stat-item .stat-num {
  font-family:'Cormorant Garamond',serif;
  font-size:3.5rem; color:var(--gold);
  letter-spacing:0.05em; line-height:1;
  transition:all 0.3s ease;
}
.stat-item:hover .stat-num {
  text-shadow:0 0 30px rgba(201,169,110,0.4);
  transform:scale(1.08);
}
.stat-item .stat-label {
  font-size:0.7rem; letter-spacing:0.3em;
  color:var(--text-muted);
  margin-top:10px;
  text-transform:uppercase;
}

/* ═══════════════════════════ DECORATIVE SECTION DIVIDER ═══════════════════════════ */
.section-divider {
  display:flex; align-items:center; justify-content:center; gap:20px;
  padding:40px 0;
  opacity:0.4;
}
.section-divider .d-line {
  width:80px; height:1px;
  background:linear-gradient(to right, transparent, var(--gold));
}
.section-divider .d-line:last-child {
  background:linear-gradient(to left, transparent, var(--gold));
}
.section-divider .d-symbol {
  color:var(--gold);
  font-size:0.6rem;
  font-family:'Cormorant Garamond',serif;
  letter-spacing:0.3em;
}

/* ═══════════════════════════ STATS ROW ═══════════════════════════ */
.stats-row {
  display:flex; justify-content:center; gap:80px;
  padding:60px 48px 100px;
  text-align:center;
}
.stat-item .stat-num {
  font-family:'Cormorant Garamond',serif;
  font-size:3rem; color:var(--gold);
  letter-spacing:0.05em; line-height:1;
}
.stat-item .stat-label {
  font-size:0.7rem; letter-spacing:0.3em;
  color:var(--text-muted);
  margin-top:8px;
  text-transform:uppercase;
}

/* ═══════════════════════════ FOOTER ═══════════════════════════ */
.footer {
  text-align:center; padding:100px 24px 48px;
  position:relative;
}
.footer::before {
  content:''; display:block;
  width:1px; height:60px;
  background:linear-gradient(to bottom, transparent, var(--gold), transparent);
  margin:0 auto 40px;
}
.footer-name {
  font-family:'Noto Serif SC',serif;
  font-size:1.8rem;
  background:linear-gradient(180deg, var(--cream), var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:0.15em;
  margin-bottom:12px;
}
.footer-sub {
  font-family:'Cormorant Garamond',serif;
  font-size:0.8rem; letter-spacing:0.35em;
  color:var(--text-muted);
  font-style:italic;
}


/* ═══════════════════════════ RESPONSIVE ═══════════════════════════ */

  nav { padding:24px 36px; }
  .gallery-container { padding:0 24px; }

  .featured-image { max-width:350px; }

}

  .gallery { grid-template-columns:repeat(2, 1fr); gap:4px; }
  .gallery-item { grid-column:span 1 !important; grid-row:span 1 !important; }
  .gallery-item:nth-child(1)  { grid-column:span 2 !important; aspect-ratio:3/4 !important; }
  .gallery-item:nth-child(2)  { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(3)  { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(4)  { grid-column:span 2 !important; aspect-ratio:16/9 !important; }
  .gallery-item:nth-child(5)  { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(6)  { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(7)  { grid-column:span 2 !important; aspect-ratio:3/4 !important; }
  .gallery-item:nth-child(8)  { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(9)  { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(10) { grid-column:span 2 !important; aspect-ratio:16/9 !important; }
  .gallery-item:nth-child(11) { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(12) { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(13) { grid-column:span 2 !important; aspect-ratio:3/4 !important; }
  .gallery-item:nth-child(14) { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(15) { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(16) { grid-column:span 2 !important; aspect-ratio:16/9 !important; }
  .gallery-item:nth-child(17) { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(18) { aspect-ratio:2/3 !important; }
  .gallery-item:nth-child(19) { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(20) { aspect-ratio:1/1 !important; }
  .gallery-item:nth-child(21) { grid-column:span 2 !important; aspect-ratio:3/2 !important; }
  .gallery-container { padding:0 12px; }
  .featured-strip { padding:60px 0; }
  .featured-strip-inner { padding:0 24px; }
  .featured-image { max-width:280px; }
  .quote-section { padding:60px 24px 40px; }
  .lightbox-nav { display:none; }
  .stats-row { gap:32px; flex-wrap:wrap; }
  .back-to-top { bottom:20px; right:20px; width:40px; height:40px; }
  .music-toggle { bottom:20px; left:20px; width:40px; height:40px; }
  .corner-accent { display:none; }
  .page-bracket { display:none; }
}

@media (max-width:480px) {
  .hero-name { font-size:2.4rem; }
  .gallery { gap:2px; }
  .gallery-container { padding:0 4px; }
}
</style>
</head>
<body>

<script>
(function() {
  const totalImages = 21;

  // ═══════ CUSTOM CURSOR ═══════
  const cursor = document.getElementById('cursor');
  const cursorDot = document.getElementById('cursorDot');
  let mouseX = 0, mouseY = 0;
  let cursorX = 0, cursorY = 0;

  if (window.matchMedia('(min-width:769px)').matches) {
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
    });

    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Add hover effect to clickable elements via delegation
    const hoverSelector = '.gallery-item, .lightbox-nav, .lightbox-close, .featured-image, .back-to-top, .music-toggle';
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest(hoverSelector)) cursor.classList.add('hover');
    });
    document.addEventListener('mouseout', (e) => {
      const fromEl = e.target.closest(hoverSelector);
      const toEl = e.relatedTarget && e.relatedTarget.closest(hoverSelector);
      if (fromEl && !toEl) cursor.classList.remove('hover');
    });
  }

  // ═══════ LOADER ═══════
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 600);
  });

  // ═══════ MUSIC CONTROL ═══════
  const bgMusic = document.getElementById('bgMusic');
  const musicToggle = document.getElementById('musicToggle');
  let musicStarted = false;

  function startMusic() {
    if (musicStarted) return;
    bgMusic.volume = 0.35;
    bgMusic.play().then(() => {
      musicStarted = true;
      musicToggle.classList.add('playing');
    }).catch(() => {});
  }

  function toggleMusic() {
    if (!musicStarted) {
      startMusic();
      return;
    }
    if (bgMusic.paused) {
      bgMusic.play();
      musicToggle.classList.add('playing');
    } else {
      bgMusic.pause();
      musicToggle.classList.remove('playing');
    }
  }

  musicToggle.addEventListener('click', (e) => { e.preventDefault(); toggleMusic(); });

  // Auto-start on first user interaction with the page
  document.addEventListener('click', startMusic, { once: true });
  document.addEventListener('touchstart', startMusic, { once: true });

  // ═══════ HERO PARTICLES ═══════
  const particlesContainer = document.getElementById('heroParticles');
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = (60 + Math.random() * 40) + '%';
    particle.style.animationDuration = (6 + Math.random() * 14) + 's';
    particle.style.animationDelay = Math.random() * 10 + 's';
    particle.style.width = (1 + Math.random() * 3) + 'px';
    particle.style.height = particle.style.width;
    particlesContainer.appendChild(particle);
  }

  // ═══════ NAV HIDE ON SCROLL ═══════
  const nav = document.getElementById('nav');
  let lastScroll = 0;
  let scrollTicking = false;
  window.addEventListener('scroll', () => {
    if (!scrollTicking) {
      requestAnimationFrame(() => {
        const st = window.pageYOffset;
        if (st > lastScroll && st > 200) nav.classList.add('hidden');
        else nav.classList.remove('hidden');
        lastScroll = st;
        scrollTicking = false;
      });
      scrollTicking = true;
    }
  });

  // ═══════ BUILD GALLERY ═══════
  const gallery = document.getElementById('gallery');
  const cornerPositions = ['tl','tr','bl','br'];
  for (let i = 1; i <= totalImages; i++) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.index = i - 1;

    const img = document.createElement('img');
    img.src = `photos/${i}.jpg`;
    img.alt = `李昀洁 · ${i}`;
    img.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'item-overlay';
    overlay.innerHTML = `<span class="item-number">${String(i).padStart(2,'0')}</span>`;

    item.appendChild(img);
    item.appendChild(overlay);

    // Corner accents (after img to appear above)
    cornerPositions.forEach(pos => {
      const corner = document.createElement('div');
      corner.className = `corner-accent corner-${pos}`;
      item.appendChild(corner);
    });
    gallery.appendChild(item);
  }

  // ═══════ REVEAL ON SCROLL ═══════
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const idx = parseInt(el.dataset.index || 0);
        el.style.transitionDelay = (idx % 6) * 0.07 + 's';
        el.classList.add('revealed');
        revealObserver.unobserve(el);
      }
    });
  }, { threshold:0.12, rootMargin:'0px 0px -40px 0px' });

  document.querySelectorAll('.gallery-item').forEach(item => revealObserver.observe(item));

  // ═══════ FEATURED IMAGE ROTATION ═══════
  const featuredImg = document.getElementById('featuredImg');
  let featuredIdx = 0;
  const featuredPhotos = [1, 4, 7, 10];
  setInterval(() => {
    featuredIdx = (featuredIdx + 1) % featuredPhotos.length;
    featuredImg.style.opacity = '0';
    featuredImg.style.transform = 'scale(1.08)';
    setTimeout(() => {
      featuredImg.src = `photos/${featuredPhotos[featuredIdx]}.jpg`;
      featuredImg.style.opacity = '1';
      featuredImg.style.transform = 'scale(1)';
    }, 400);
  }, 4000);
  featuredImg.style.transition = 'opacity 0.5s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1)';

  // ═══════ LIGHTBOX ═══════
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCounter = document.getElementById('lightboxCounter');
  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    lightboxImg.style.opacity = '0';
    lightboxImg.style.transform = 'scale(0.95)';
    setTimeout(() => {
      lightboxImg.src = `photos/${currentIndex + 1}.jpg`;
      lightboxImg.style.opacity = '1';
      lightboxImg.style.transform = 'scale(1)';
    }, 200);
    lightboxCounter.textContent = `${String(currentIndex + 1).padStart(2,'0')} / ${String(totalImages).padStart(2,'0')}`;
  }
  lightboxImg.style.transition = 'opacity 0.35s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1)';

  function nextImage() { currentIndex = (currentIndex + 1) % totalImages; updateLightbox(); }
  function prevImage() { currentIndex = (currentIndex - 1 + totalImages) % totalImages; updateLightbox(); }

  gallery.addEventListener('click', (e) => {
    const item = e.target.closest('.gallery-item');
    if (!item) return;
    openLightbox(parseInt(item.dataset.index));
  });

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxPrev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
  document.getElementById('lightboxNext').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
  });

  // Touch swipe
  let touchStartX = 0;
  lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  lightbox.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 60) { diff > 0 ? nextImage() : prevImage(); }
  });

  // ═══════ SPARKLES ON MOUSE MOVE ═══════
  const sparkleContainer = document.getElementById('sparkleContainer');
  let sparkleThrottle = false;
  document.addEventListener('mousemove', (e) => {
    if (sparkleThrottle) return;
    sparkleThrottle = true;
    requestAnimationFrame(() => {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = e.clientX + 'px';
      sparkle.style.top = e.clientY + 'px';
      sparkleContainer.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 1500);
      sparkleThrottle = false;
    });
  });

  // ═══════ QUOTE REVEAL ═══════
  const quoteSection = document.querySelector('.quote-section');
  const quoteObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        quoteObserver.unobserve(entry.target);
      }
    });
  }, { threshold:0.4 });
  quoteObserver.observe(quoteSection);

  // ═══════ STATS COUNT ANIMATION ═══════
  const statNums = document.querySelectorAll('.stat-item .stat-num');
  const countObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const target = el.textContent;
        if (target === '∞') return;
        const targetNum = parseInt(target);
        if (isNaN(targetNum)) return;
        let current = 0;
        const duration = 1500;
        const step = targetNum / (duration / 16);
        el.textContent = '0';
        function tick() {
          current += step;
          if (current >= targetNum) { el.textContent = target; return; }
          el.textContent = Math.floor(current);
          requestAnimationFrame(tick);
        }
        tick();
        countObserver.unobserve(el);
      }
    });
  }, { threshold:0.5 });
  statNums.forEach(el => countObserver.observe(el));

  // ═══════ BACK TO TOP ═══════
  const backToTop = document.getElementById('backToTop');
  let bttTicking = false;
  window.addEventListener('scroll', () => {
    if (!bttTicking) {
      requestAnimationFrame(() => {
        if (window.pageYOffset > 600) backToTop.classList.add('visible');
        else backToTop.classList.remove('visible');
        bttTicking = false;
      });
      bttTicking = true;
    }
  });
  backToTop.addEventListener('click', (e) => {
    e.preventDefault();
    window.scrollTo({ top:0, behavior:'smooth' });
  });

  // ═══════ PARALLAX ON FEATURED TEXT ═══════
  const featuredText = document.querySelector('.featured-text');
  window.addEventListener('scroll', () => {
    if (featuredText) {
      const rect = featuredText.getBoundingClientRect();
      const center = rect.top + rect.height / 2;
      const vh = window.innerHeight;
      if (center > 0 && center < vh) {
        const offset = (center - vh * 0.5) * 0.05;
        featuredText.style.transform = `translateY(${offset}px)`;
        featuredText.style.transition = 'none';
      }
    }
  }, { passive: true });

})();
</script>
</body>
</html>
